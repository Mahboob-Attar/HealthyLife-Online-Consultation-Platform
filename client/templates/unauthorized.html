<!DOCTYPE html>
<html>
<head>
    <title>Access Denied</title>
    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #0b1a3c;
            color: white;
            text-align: center;
        }

        /* ================= VIDEO AD ================= */
        #adContainer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: black;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 9999;
        }

        #adVideo {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .ad-controls {
            position: absolute;
            bottom: 40px;
            text-align: center;
        }

        #skipBtn {
            padding: 10px 20px;
            background: red;
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 5px;
            cursor: pointer;
            display: none;
        }

        #timer {
            color: white;
            font-size: 18px;
            margin-bottom: 10px;
        }

        /* ================= MAIN PAGE ================= */
        #mainContent {
            display: none;
            padding-top: 100px;
        }

        a {
            color: #00eaff;
            text-decoration: none;
            font-size: 18px;
        }

        /* SOCIAL SECTION */
        .social-section {
            margin-top: 60px;
        }

        .social-title {
            font-size: 22px;
            margin-bottom: 20px;
            color: #ffd700;
        }

        .social-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .social-btn {
            padding: 12px 25px;
            border-radius: 30px;
            font-weight: bold;
            text-decoration: none;
            color: white;
            transition: 0.3s;
        }

        .insta { background: linear-gradient(45deg, #ff416c, #ff4b2b); }
        .linkedin { background: #0077b5; }
        .github { background: #333; }

        .social-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(255,255,255,0.6);
        }

    </style>
</head>
<body>

<!-- ================= VIDEO AD ================= -->
<div id="adContainer">
    <video id="adVideo" playsinline>
        <source src="{{ url_for('static', filename='assets/ad.mp4') }}" type="video/mp4">
    </video>

    <div class="ad-controls">
        <div id="timer">Ad ends in 5 seconds</div>
        <button id="skipBtn">Skip Ad</button>
    </div>
</div>

<!-- ================= ORIGINAL PAGE ================= -->
<div id="mainContent">

    <h2>🚫 Access Denied</h2>

    <p>You must be logged in as a <strong>User</strong> to book an appointment.</p>

    <p>If you are logged in as <strong>Admin</strong>, appointment booking is not permitted.</p>

    <h3>Please use the menu icon to log in account.</h3>

    <a href="/">⬅ Go to Home</a>

    <!-- SOCIAL LINKS KEPT -->
    <div class="social-section">
        <div class="social-title"> Connect With Me </div>

        <div class="social-container">
            <a href="https://www.instagram.com/bablu.x.o?igsh=MW8xcTBoYjIyOWowYg==" target="_blank" class="social-btn insta">
                📸 Instagram
            </a>

            <a href="https://www.linkedin.com/in/mahboob-attar/" target="_blank" class="social-btn linkedin">
                💼 LinkedIn
            </a>

            <a href="https://github.com/Mahboob-Attar" target="_blank" class="social-btn github">
                💻 GitHub
            </a>
        </div>
    </div>

</div>

<script>
    const video = document.getElementById("adVideo");
    const skipBtn = document.getElementById("skipBtn");
    const adContainer = document.getElementById("adContainer");
    const mainContent = document.getElementById("mainContent");
    const timer = document.getElementById("timer");

    let countdown = 5;

    // Try autoplay with sound
    video.muted = false;
    video.play().catch(() => {
        // If blocked, start on first click
        adContainer.addEventListener("click", () => {
            video.play();
        }, { once: true });
    });

    // Countdown
    let interval = setInterval(() => {
        countdown--;
        timer.innerText = "Ad ends in " + countdown + " seconds";

        if (countdown <= 0) {
            clearInterval(interval);
            skipBtn.style.display = "inline-block";
            timer.innerText = "You can skip now";
        }
    }, 1000);

    skipBtn.addEventListener("click", closeAd);
    video.addEventListener("ended", closeAd);

    function closeAd() {
        video.pause();
        video.currentTime = 0;
        adContainer.style.display = "none";
        mainContent.style.display = "block";
    }
</script>

</body>
</html>
